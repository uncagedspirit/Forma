name: forma
description: "A habit journal for the intentional."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # UI & Animation
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  import_sorter: ^4.6.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#F5F0E8"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#F5F0E8"

import_sorter:
  emojis: false
  comments: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter:
  # Required for Material icons (Icons.check, Icons.chevron_right, etc.)
  # used throughout the widget tree. Must be true.
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces-Light.ttf
          weight: 300
        - asset: assets/fonts/Fraunces-Medium.ttf
          weight: 500
    - family: Instrument Sans
      fonts:
        - asset: assets/fonts/InstrumentSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/InstrumentSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/InstrumentSans-SemiBold.ttf
          weight: 600