name: forma
description: "A habit journal for the intentional."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

  # Charts (activity graph)
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: false

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces-Light.ttf
          weight: 300
        - asset: assets/fonts/Fraunces-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fraunces-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Fraunces-LightItalic.ttf
          style: italic
          weight: 300
    - family: Instrument Sans
      fonts:
        - asset: assets/fonts/InstrumentSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/InstrumentSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/InstrumentSans-SemiBold.ttf
          weight: 600